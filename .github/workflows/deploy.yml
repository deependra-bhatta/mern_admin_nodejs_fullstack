name: MERN Stack CI/CD

on:
  push:
    branches: [main, develop]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/${{ github.repository_owner }}/mern-backend
  FRONTEND_IMAGE: ghcr.io/${{ github.repository_owner }}/mern-frontend
  PIPELINEWATCH_URL: http://192.168.1.71:8080
  PIPELINEWATCH_KEY: OaJjVk2rYKeLxj1nGl6P8dKofLxOh4OlKP4detdk8tM

permissions:
  contents: read
  packages: write

jobs:

# ─────────────────────────────────────────
# 1. Build & push backend → GHCR
# ─────────────────────────────────────────
  build_backend:
    name: Build Backend
    runs-on: ubuntu-latest
    outputs:
      duration: ${{ steps.timer.outputs.duration }}
    steps:
      - name: Start timer
        id: start
        run: echo "start=$(date +%s)" >> $GITHUB_OUTPUT

      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & Push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Calculate duration
        id: timer
        if: always()
        run: echo "duration=$(( $(date +%s) - ${{ steps.start.outputs.start }} ))" >> $GITHUB_OUTPUT

# ─────────────────────────────────────────
# 2. Build & push frontend → GHCR
# ─────────────────────────────────────────
  build_frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    outputs:
      duration: ${{ steps.timer.outputs.duration }}
    steps:
      - name: Start timer
        id: start
        run: echo "start=$(date +%s)" >> $GITHUB_OUTPUT

      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          build-args: REACT_APP_API_BASE_URL=/api/
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Calculate duration
        id: timer
        if: always()
        run: echo "duration=$(( $(date +%s) - ${{ steps.start.outputs.start }} ))" >> $GITHUB_OUTPUT

# ─────────────────────────────────────────
# 3. Deploy on self-hosted VM runner
# ─────────────────────────────────────────
  deploy:
    name: Deploy to Dev VM
    needs: [build_backend, build_frontend]
    runs-on: [self-hosted, Linux, X64]
    outputs:
      duration: ${{ steps.timer.outputs.duration }}
    steps:
      - name: Start timer
        id: start
        run: echo "start=$(date +%s)" >> $GITHUB_OUTPUT

      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Pull latest images
        run: docker compose -f docker-compose.yaml pull

      - name: Deploy
        run: docker compose -f docker-compose.yaml up -d --force-recreate

      - name: Health check
        run: |
          sleep 5
          docker compose -f docker-compose.yaml ps

      - name: Calculate duration
        id: timer
        if: always()
        run: echo "duration=$(( $(date +%s) - ${{ steps.start.outputs.start }} ))" >> $GITHUB_OUTPUT

# ─────────────────────────────────────────
# 4. Report to PipelineWatch (always runs)
#    Real durations captured from each job
# ─────────────────────────────────────────
  report:
    name: Report to PipelineWatch
    needs: [build_backend, build_frontend, deploy]
    if: always()
    runs-on: [self-hosted, Linux, X64]
    steps:
      - name: Send report
        run: |
          B="${{ needs.build_backend.result }}"
          F="${{ needs.build_frontend.result }}"
          D="${{ needs.deploy.result }}"

          BD="${{ needs.build_backend.outputs.duration }}"
          FD="${{ needs.build_frontend.outputs.duration }}"
          DD="${{ needs.deploy.outputs.duration }}"

          # Fallback to 0 if empty
          BD="${BD:-0}"
          FD="${FD:-0}"
          DD="${DD:-0}"

          if [[ "$B" == "success" && "$F" == "success" && "$D" == "success" ]]; then
            STATUS="success"
          elif [[ "$B" == "cancelled" || "$F" == "cancelled" || "$D" == "cancelled" ]]; then
            STATUS="cancelled"
          else
            STATUS="failure"
          fi

          TOTAL=$(( BD + DD ))

          curl -s -X POST "${{ env.PIPELINEWATCH_URL }}/webhooks/generic" \
            -H "X-API-Key: ${{ env.PIPELINEWATCH_KEY }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"pipeline\": \"${{ github.workflow }}\",
              \"repo\": \"${{ github.repository }}\",
              \"branch\": \"${{ github.ref_name }}\",
              \"commit\": \"${{ github.sha }}\",
              \"status\": \"$STATUS\",
              \"duration_s\": $TOTAL,
              \"actor\": \"${{ github.actor }}\",
              \"run_url\": \"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\",
              \"steps\": [
                {\"number\": 1, \"name\": \"Build Backend\",    \"status\": \"$B\", \"duration_s\": $BD},
                {\"number\": 2, \"name\": \"Build Frontend\",   \"status\": \"$F\", \"duration_s\": $FD},
                {\"number\": 3, \"name\": \"Deploy to Dev VM\", \"status\": \"$D\", \"duration_s\": $DD}
              ]
            }"

          echo "Reported → status=$STATUS backend=${BD}s frontend=${FD}s deploy=${DD}s"
