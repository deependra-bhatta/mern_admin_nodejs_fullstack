name: MERN Stack CI/CD

on:
  push:
    branches: [main, develop]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/${{ github.repository_owner }}/mern-backend
  FRONTEND_IMAGE: ghcr.io/${{ github.repository_owner }}/mern-frontend

permissions:
  contents: read
  packages: write

jobs:

# ─────────────────────────────────────────
# 1. Build & push backend → GHCR
# ─────────────────────────────────────────
  build_backend:
    name: Build Backend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & Push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

# ─────────────────────────────────────────
# 2. Build & push frontend → GHCR
# ─────────────────────────────────────────
  build_frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          build-args: REACT_APP_API_BASE_URL=/api/
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

# ─────────────────────────────────────────
# 3. Deploy on self-hosted VM runner
# ─────────────────────────────────────────
  deploy:
    name: Deploy to Dev VM
    needs: [build_backend, build_frontend]
    runs-on: [self-hosted, Linux, X64]
    env:
      DATABASE: ${{ secrets.DATABASE }}
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      SECRET: ${{ secrets.SECRET }}
      KEY: ${{ secrets.KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create env files
        run: |
          {
            echo "NODE_ENV=production"
            echo "PORT=8888"
            echo "MONGO_URI=mongodb://mern-mongodb:27017/mern-admin"
            echo "JWT_SCHEME=jwt"
            echo "JWT_TOKEN_PREFIX=Bearer"
            echo "JWT_TOKEN_EXPIRATION=18000000"
            echo "JWT_TOKEN_HASH_ALGO=SHA-256"
          } > backend/.variables.env

          {
            echo "REACT_APP_API_BASE_URL=/api/"
            echo "GENERATE_SOURCEMAP=false"
            echo "REACT_APP_DEV_REMOTE=local"
          } > frontend/.env

      - name: Ensure docker is accessible
        run: |
          if ! docker info > /dev/null 2>&1; then
            echo "Docker socket not accessible, fixing permissions..."
            sudo chmod 666 /var/run/docker.sock
          fi
          docker info | grep "Server Version"

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Pull latest images
        run: docker compose -f docker-compose.yaml pull

      - name: Deploy
        run: docker compose -f docker-compose.yaml up -d --force-recreate

      - name: Health check
        run: |
          sleep 10
          echo "=== Container Status ==="
          docker compose -f docker-compose.yaml ps
          echo ""
          echo "=== Recent Logs ==="
          docker compose -f docker-compose.yaml logs --tail=30
